<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Web-Gateway</title>
    <style>
      body {
        min-width: 260px;
        margin: 0;
        padding: 14px;
        color: #1f2937;
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 650;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #f9fafb;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #9ca3af;
      }
      .dot.connected { background: #059669; }
      code {
        display: block;
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        background: #111827;
        color: #f9fafb;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Web-Gateway CDP Transport</h1>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="status">Checking...</span>
    </div>
    <code>node scripts/check-cdp.mjs</code>
    <script src="popup.js"></script>
  </body>
</html>
